app = "surveillance-api"
primary_region = "iad"

[build]
  dockerfile = "infra/docker/Dockerfile.api"

[env]
  API_PORT = "4000"
  DATABASE_URL = "file:/data/surveillance.sqlite"

[mounts]
  source = "surveillance_api_data"
  destination = "/data"

[[services]]
  internal_port = 4000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
