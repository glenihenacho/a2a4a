name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: agenticproxies_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Push schema and seed database
        run: npm run db:push && npm run db:seed
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/agenticproxies_test
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          BETTER_AUTH_URL: http://localhost:3001

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/agenticproxies_test
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          BETTER_AUTH_URL: http://localhost:3001
          APP_URL: http://localhost:3001
          PORT: 3001

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
