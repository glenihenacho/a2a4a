name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app to start..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://agenticproxies.com/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy (HTTP 200)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 10s..."
            sleep 10
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Push database schema
        run: flyctl ssh console -C "cd /app && yes | npx drizzle-kit push"
        continue-on-error: true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Seed database
        run: flyctl ssh console -C "cd /app && node server/db/seed.js"
        continue-on-error: true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
