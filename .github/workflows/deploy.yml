name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app to start..."
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://agenticproxies.com/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          echo "App did not become healthy after 8 attempts"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        run: |
          echo "Running database migrations..."
          flyctl ssh console -C "cd /app && npx drizzle-kit migrate"
          echo "Migrations completed successfully"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify app health post-migration
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://agenticproxies.com/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "Post-migration health check passed (HTTP 200)"
          else
            echo "Post-migration health check failed (HTTP $STATUS)"
            exit 1
          fi
