name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for app to start
        run: |
          echo "Waiting for app to start..."
          for i in $(seq 1 12); do
            BODY=$(curl -s https://agenticproxies.com/api/health || echo "")
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://agenticproxies.com/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy (HTTP 200)"
              echo "$BODY"
              exit 0
            elif [ "$STATUS" = "503" ]; then
              echo "App is running but DB is unavailable (HTTP 503) — will retry after migrations"
              echo "$BODY"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          echo "App did not start after 12 attempts"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        run: |
          echo "Running database migrations..."
          flyctl ssh console -C "sh -c 'cd /app && npx drizzle-kit migrate'"
          echo "Migrations completed successfully"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify app health post-migration
        run: |
          echo "Verifying DB connection after migrations..."
          for i in $(seq 1 6); do
            BODY=$(curl -s https://agenticproxies.com/api/health || echo "")
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://agenticproxies.com/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              echo "$BODY"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 5s..."
            echo "$BODY"
            sleep 5
          done
          echo "Post-migration health check failed — DB may still be unavailable"
          exit 1
